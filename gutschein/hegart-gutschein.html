<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="hz:canvas-width" content="1240">
<meta name="hz:canvas-height" content="775">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1240px;
    height: 775px;
  }

  .slide {
    position: relative;
    width: 1240px;
    height: 775px;
    background:
      radial-gradient(120% 90% at 50% 0%, #20242a 0%, #15181d 55%, #0f1115 100%);
    overflow: hidden;
    font-family: 'Jost', sans-serif;
  }

  /* ---- subtle texture overlay ---- */
  .grain {
    position: absolute; inset: 0;
    background:
      radial-gradient(60% 50% at 18% 22%, rgba(176,141,79,0.10), transparent 60%),
      radial-gradient(50% 45% at 88% 88%, rgba(176,141,79,0.08), transparent 60%);
    pointer-events: none;
  }

  /* ---- giant watermark monogram ---- */
  .monogram {
    position: absolute;
    right: -70px;
    bottom: -180px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 720px;
    line-height: 1;
    color: rgba(176,141,79,0.06);
    user-select: none;
  }

  /* ---- double gold frame ---- */
  .frame-outer {
    position: absolute;
    inset: 34px;
    border: 1px solid rgba(176,141,79,0.55);
  }
  .frame-inner {
    position: absolute;
    inset: 42px;
    border: 1px solid rgba(176,141,79,0.28);
  }

  /* ---- content ---- */
  .content {
    position: absolute;
    inset: 42px;
    padding: 56px 70px 50px;
    display: flex;
    flex-direction: column;
    color: #efe9dd;
  }

  /* header */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 40px;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: #f3ecdc;
    margin-left: 10px;
  }
  .brand .accent { color: #c9a86a; }
  .tagline {
    margin-top: 12px;
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(201,168,106,0.85);
    font-weight: 300;
  }
  .rule {
    margin: 22px auto 0;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a86a, transparent);
    position: relative;
  }
  .rule::after {
    content: "";
    position: absolute;
    left: 50%; top: 50%;
    width: 6px; height: 6px;
    transform: translate(-50%,-50%) rotate(45deg);
    background: #c9a86a;
  }

  /* hero */
  .hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .gutschein {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 112px;
    line-height: 0.95;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #f5efe2;
  }
  .sub {
    margin-top: 10px;
    font-size: 15px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(239,233,221,0.7);
    font-weight: 300;
  }

  /* value field */
  .value-row {
    margin-top: 30px;
    display: flex;
    align-items: flex-end;
    gap: 18px;
  }
  .value-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 26px;
    color: #c9a86a;
    white-space: nowrap;
    padding-bottom: 6px;
  }
  .value-line {
    width: 300px;
    border-bottom: 1.5px solid rgba(201,168,106,0.7);
    height: 44px;
  }
  .value-currency {
    font-family: 'Cormorant Garamond', serif;
    font-size: 46px;
    color: #f5efe2;
    padding-bottom: 2px;
  }

  /* footer fields */
  .fields {
    display: flex;
    justify-content: space-between;
    gap: 40px;
    margin-top: 6px;
  }
  .field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .field .line {
    height: 30px;
    border-bottom: 1px solid rgba(239,233,221,0.30);
  }
  .field .cap {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(239,233,221,0.55);
    font-weight: 300;
  }

  /* base line */
  .baseline {
    margin-top: 26px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(201,168,106,0.85);
    font-weight: 300;
  }
  .baseline .web { color: #d8c79a; }
</style>
</head>
<body>
  <div class="slide">
    <div class="grain"></div>
    <div class="monogram">H</div>
    <div class="frame-outer"></div>
    <div class="frame-inner"></div>

    <div class="content">
      <div class="header">
        <div class="brand">Heg<span class="accent">art</span> Studio</div>
        <div class="tagline">Design · Fotografie · Branding · Events</div>
        <div class="rule"></div>
      </div>

      <div class="hero">
        <div class="gutschein">Gutschein</div>
        <div class="sub">im Wert von</div>

        <div class="value-row">
          <div class="value-line"></div>
          <div class="value-currency">€</div>
        </div>
      </div>

      <div class="fields">
        <div class="field">
          <div class="line"></div>
          <div class="cap">Für</div>
        </div>
        <div class="field">
          <div class="line"></div>
          <div class="cap">Gutschein-Nr.</div>
        </div>
        <div class="field">
          <div class="line"></div>
          <div class="cap">Gültig bis</div>
        </div>
      </div>

      <div class="baseline">
        <span>Einlösbar für alle Leistungen</span>
        <span class="web">www.hegart.de</span>
      </div>
    </div>
  </div>
</body>
</html>
